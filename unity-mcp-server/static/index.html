<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitBing · Unity Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --radius:   10px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.4px;
    }
    .logo .accent { color: var(--accent); }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      background: #21262d;
      border: 1px solid var(--border);
      transition: color .2s, border-color .2s;
    }
    .badge.connected    { color: var(--green); border-color: #238636; }
    .badge.disconnected { color: var(--red);   border-color: #da3633; }
    .badge.connecting   { color: #d29922;       border-color: #9e6a03; }
    .spacer { flex: 1; }
    .arch-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* ── MAIN ── */
    main { display: flex; flex: 1; overflow: hidden; }

    /* ── CHAT PANEL ── */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
      user-select: none;
    }
    .empty-state .hero { font-size: 48px; line-height: 1; }
    .empty-state h2 { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-state p  { font-size: 13px; line-height: 1.7; max-width: 320px; }
    .empty-state .hint {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }
    .hint-chip {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .15s;
    }
    .hint-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MESSAGES ── */
    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    .message.user   { align-self: flex-end; flex-direction: row-reverse; }
    .message.system { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .message.user .avatar   { background: #1f6feb; color: #fff; }
    .message.system .avatar { background: #21262d; border: 1px solid var(--border); }

    .bubble {
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
    }
    .message.user .bubble {
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .message.system .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-bubble {
      background: var(--surface2);
      border: 1px solid #238636;
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      max-width: 100%;
    }
    .result-bubble .score-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 8px;
    }
    .score-num  { font-size: 28px; font-weight: 700; color: var(--green); }
    .score-denom { font-size: 14px; color: var(--muted); }
    .grade-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: #1a3a1a;
      color: var(--green);
    }
    .result-bubble pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 9px 13px;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 0 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      height: 40px;
      white-space: nowrap;
      transition: opacity .15s;
    }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: .82; }

    /* ── PIPELINE SIDEBAR ── */
    #pipeline-panel {
      width: 270px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 14px 12px;
      gap: 8px;
      background: var(--surface);
    }
    #pipeline-panel::-webkit-scrollbar { width: 4px; }
    #pipeline-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pipeline-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── AGENT CARDS ── */
    .agent-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 11px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      transition: border-color .25s;
    }
    .agent-card.running { border-color: var(--c); }
    .agent-card.done    { border-left: 3px solid var(--c); }
    .agent-card.error   { border-color: var(--red); }

    .agent-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--c, #444);
      flex-shrink: 0;
      margin-top: 3px;
    }
    .agent-card.idle    .agent-dot { background: #3a3f47; }
    .agent-card.running .agent-dot { animation: glow 1.1s ease-in-out infinite; }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0   var(--c); }
      50%      { box-shadow: 0 0 0 4px transparent; }
    }

    .agent-body { flex: 1; min-width: 0; }
    .agent-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .agent-name {
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .agent-status {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .agent-card.idle    .agent-status { background: #21262d; color: var(--muted); }
    .agent-card.running .agent-status { background: #1a2540; color: var(--accent); }
    .agent-card.done    .agent-status { background: #1a3a1a; color: var(--green); }
    .agent-card.error   .agent-status { background: #3a1a1a; color: var(--red); }

    .agent-msg {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="accent">BitBing</span> Unity Bridge</div>
  <div id="status-badge" class="badge connecting">Bağlanıyor…</div>
  <div class="spacer"></div>
  <div class="arch-label">UI :8001 → Python → Unity :8080</div>
</header>

<main>

  <!-- ── CHAT ── -->
  <section id="chat-panel">
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="hero">🎮</div>
        <h2>Unity Projeni Oluştur</h2>
        <p>Bir komut gir — 6 ajan devreye girerek Unity projen üzerinde çalışmaya başlar.</p>
        <div class="hint">
          <span class="hint-chip" data-hint="2D platformer oyun yap, düşmanlar ve skor UI ile">Platformer</span>
          <span class="hint-chip" data-hint="FPS oyun yap, silah sistemi ve düşmanlar ekle">FPS</span>
          <span class="hint-chip" data-hint="Puzzle oyun yap, fizik mekanikleri ile">Puzzle</span>
        </div>
      </div>
    </div>

    <div id="input-area">
      <textarea
        id="prompt-input"
        rows="1"
        placeholder="Unity için bir komut gir… (Shift+Enter yeni satır)"
      ></textarea>
      <button id="send-btn" disabled>Gönder</button>
    </div>
  </section>

  <!-- ── PIPELINE ── -->
  <aside id="pipeline-panel">
    <div class="pipeline-title">Ajan Pipeline</div>
    <!-- cards injected by JS -->
  </aside>

</main>

<script>
const AGENTS = [
  { id: 'vates',     label: 'vates',     color: '#FF3B3B', role: 'Girdi analizi → Görev DAG' },
  { id: 'diafor',    label: 'Diafor',    color: '#FFD600', role: 'Bağımlılık & bağlantı kontrolü' },
  { id: 'ahbab',     label: 'ahbab',     color: '#00E676', role: 'Unity komut uygulayıcı' },
  { id: 'obsidere',  label: 'obsidere',  color: '#2979FF', role: 'Hata denetimi & düzeltme' },
  { id: 'patientia', label: 'patientia', color: '#AA00FF', role: 'Build puanlama (1-100)' },
  { id: 'magnumpus', label: 'magnumpus', color: '#FF6D00', role: 'Paketleme & teslimat' },
];

const STATUS_LABELS = { idle: 'idle', running: 'çalışıyor', done: 'tamamlandı', error: 'hata' };

// ── DOM
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('prompt-input');
const sendBtn     = document.getElementById('send-btn');
const pipelineEl  = document.getElementById('pipeline-panel');
const statusBadge = document.getElementById('status-badge');
let emptyState    = document.getElementById('empty-state');

// ── Build agent cards
const pipelineTitle = pipelineEl.querySelector('.pipeline-title');
AGENTS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card idle';
  card.id = `card-${a.id}`;
  card.style.setProperty('--c', a.color);
  card.innerHTML = `
    <div class="agent-dot"></div>
    <div class="agent-body">
      <div class="agent-name-row">
        <span class="agent-name">${a.label}</span>
        <span class="agent-status" id="badge-${a.id}">idle</span>
      </div>
      <div class="agent-msg" id="msg-${a.id}">${a.role}</div>
    </div>
  `;
  pipelineEl.appendChild(card);
});

// ── Hint chips
document.querySelectorAll('.hint-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    inputEl.value = chip.dataset.hint;
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  });
});

// ── WebSocket
let ws   = null;
let busy = false;

function connect() {
  statusBadge.textContent = 'Bağlanıyor…';
  statusBadge.className = 'badge connecting';

  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    statusBadge.textContent = 'Bağlı';
    statusBadge.className = 'badge connected';
    if (!busy) sendBtn.disabled = !inputEl.value.trim();
  };

  ws.onclose = () => {
    statusBadge.textContent = 'Bağlantı Kesildi';
    statusBadge.className = 'badge disconnected';
    sendBtn.disabled = true;
    busy = false;
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = e => {
    try { handle(JSON.parse(e.data)); }
    catch (_) {}
  };
}

function handle(event) {
  if (event.type === 'agent_event') {
    setAgent(event.agentId, event.status, event.message);
  } else if (event.type === 'pipeline_complete') {
    onComplete(event);
  } else if (event.type === 'pipeline_failed') {
    onFailed(event);
  }
}

function setAgent(id, status, message) {
  const card  = document.getElementById(`card-${id}`);
  const badge = document.getElementById(`badge-${id}`);
  const msg   = document.getElementById(`msg-${id}`);
  if (!card) return;
  card.className = `agent-card ${status}`;
  badge.textContent = STATUS_LABELS[status] || status;
  msg.textContent = message;
}

function resetAgents() {
  AGENTS.forEach(a => setAgent(a.id, 'idle', a.role));
}

function onComplete(event) {
  busy = false;
  sendBtn.disabled = !inputEl.value.trim();
  removeThinking();

  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="result-bubble">
      <div class="score-line">
        <span class="score-num">${event.score}</span>
        <span class="score-denom">/100</span>
        <span class="grade-badge">${event.grade}</span>
      </div>
      <pre>${esc(event.summary)}</pre>
    </div>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function onFailed(event) {
  busy = false;
  sendBtn.disabled = !inputEl.value.trim();
  removeThinking();
  addSysMsg(`❌ Pipeline başarısız: ${event.reason}`);
}

function addSysMsg(text) {
  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble">${text}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addThinking() {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'message system';
  div.id = 'thinking-msg';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="spinner"></span>Pipeline başlatıldı…</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function addUserMsg(text) {
  if (emptyState) { emptyState.remove(); emptyState = null; }
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="avatar">S</div><div class="bubble">${esc(text)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Send
function send() {
  const prompt = inputEl.value.trim();
  if (!prompt || busy || !ws || ws.readyState !== WebSocket.OPEN) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addUserMsg(prompt);
  resetAgents();
  addThinking();

  ws.send(JSON.stringify({ prompt, gameType: '2D Platformer' }));
}

sendBtn.addEventListener('click', send);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  if (!busy && ws && ws.readyState === WebSocket.OPEN) {
    sendBtn.disabled = !inputEl.value.trim();
  }
});

connect();
</script>
</body>
</html>
